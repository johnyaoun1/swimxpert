<section class="section-padding bg-gray-50 min-h-screen">
  <div class="container mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">My Payments</h1>

    @if (loading) {
      <div class="premium-container">Loading payment history...</div>
    } @else {
      <div class="premium-container overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b">
              <th class="text-left p-3">Date</th>
              <th class="text-left p-3">Amount</th>
              <th class="text-left p-3">Method</th>
              <th class="text-left p-3">Reference</th>
            </tr>
          </thead>
          <tbody>
            @for (p of payments; track p.id) {
              <tr class="border-b">
                <td class="p-3">{{ p.paymentDate | date:'shortDate' }}</td>
                <td class="p-3">${{ p.amount }}</td>
                <td class="p-3">{{ p.method }}</td>
                <td class="p-3">{{ p.reference || '-' }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }

    @if (errorMessage) {
      <div class="premium-container text-red-600 mt-4">{{ errorMessage }}</div>
    }
  </div>
</section>
