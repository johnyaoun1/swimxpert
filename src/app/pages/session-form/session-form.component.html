<section class="section-padding bg-gray-50 min-h-screen">
  <div class="container mx-auto max-w-2xl">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">{{ isEdit ? 'Edit Session' : 'Create Session' }}</h1>

    <div class="premium-container space-y-4">
      <input [(ngModel)]="form.poolId" type="text" placeholder="Pool ID" class="w-full px-4 py-3 border rounded-lg" />

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input [(ngModel)]="form.date" type="date" class="px-4 py-3 border rounded-lg" />
        <input [(ngModel)]="form.skillLevel" type="number" min="1" max="10" class="px-4 py-3 border rounded-lg" />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input [(ngModel)]="form.startTime" type="time" class="px-4 py-3 border rounded-lg" />
        <input [(ngModel)]="form.endTime" type="time" class="px-4 py-3 border rounded-lg" />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input [(ngModel)]="form.maxSwimmers" type="number" min="1" placeholder="Max swimmers" class="px-4 py-3 border rounded-lg" />
        <input [(ngModel)]="form.coach" type="text" placeholder="Coach name" class="px-4 py-3 border rounded-lg" />
      </div>

      <div class="flex gap-3">
        <button class="btn-primary" [disabled]="loading" (click)="save()">
          {{ loading ? 'Saving...' : 'Save Session' }}
        </button>
        <a routerLink="/sessions" class="btn-secondary">Cancel</a>
      </div>

      @if (errorMessage) {
        <p class="text-red-600">{{ errorMessage }}</p>
      }
    </div>
  </div>
</section>
